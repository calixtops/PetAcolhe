# =============================================================
# Nginx site para PetAcolhe — instale em
#   /etc/nginx/sites-available/petacolhe.conf
# e linke em /etc/nginx/sites-enabled/
# =============================================================
#
# Esta config NÃO toca em vortex-api.conf. Roda em paralelo.
#
# Trocar `server_name` quando tiver o domínio definitivo.

server {
    listen 80;
    listen [::]:80;
    server_name petacolhe.vortexmundus.com;   # << ajuste

    # Limite de upload (fotos das colônias)
    client_max_body_size 8M;

    # ---- Frontend (SPA estática) ----
    root /srv/petacolhe/web/dist;
    index index.html;

    # Cache forte para hashed assets do Vite
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — qualquer rota não-arquivo cai no index.html
    location / {
        try_files $uri /index.html;
    }

    # ---- Arquivos enviados (fotos) ----
    location /uploads/ {
        alias /srv/petacolhe/uploads/;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ---- API (proxy reverso) ----
    location /api/ {
        proxy_pass http://127.0.0.1:4002/;   # / final remove o prefixo /api
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Bloqueia dotfiles
    location ~ /\. { deny all; }
}

# Depois de configurar o DNS do subdomínio:
#   sudo certbot --nginx -d petacolhe.vortexmundus.com
# para HTTPS automático.
