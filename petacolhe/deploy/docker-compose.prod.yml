# =============================================================
# Docker Compose produção — PetAcolhe
# Roda em /srv/petacolhe no servidor
# - Postgres exposto SÓ na rede interna (sem porta pública)
# - API exposta SÓ em 127.0.0.1:4002 (nginx faz proxy)
# =============================================================

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: petacolhe_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    # SEM ports: — só acessível pelos outros containers
    networks: [petacolhe-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    container_name: petacolhe_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      PETACOLHE_API_PORT: 4002
      PETACOLHE_PUBLIC_URL: ${PETACOLHE_PUBLIC_URL}
    ports:
      - "127.0.0.1:4002:4002"   # apenas localhost — nginx faz proxy
    volumes:
      - ./uploads:/app/apps/petacolhe-api/uploads
    networks: [petacolhe-net]

networks:
  petacolhe-net:
    driver: bridge
