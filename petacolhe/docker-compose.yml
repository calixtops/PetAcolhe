services:
  db:
    image: postgis/postgis:16-3.4
    container_name: geo_apps_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geo_apps}
      POSTGRES_USER: ${POSTGRES_USER:-geo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geo_dev_pw}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - geo_apps_data:/var/lib/postgresql/data

volumes:
  geo_apps_data:
